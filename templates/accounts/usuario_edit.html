{% extends 'base.html' %}

{% block title %}Gerenciamento Usuario{% endblock %}

{% block page_title %}Editar Usuario{% endblock %}

{% block breadcrumb_current %}Editar Usuario{% endblock %}

{% block content%}



<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0">Editar Usuário - {{ usuario.username }}</h5>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" value="{{ usuario.username }}" readonly>
            </div>
            
            <div class="mb-3">
              <label class="form-label">E-mail</label>
              <input type="email" class="form-control" name="email" value="{{ usuario.email }}">
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" name="first_name" value="{{ usuario.first_name }}">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Sobrenome</label>
                <input type="text" class="form-control" name="last_name" value="{{ usuario.last_name }}">
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Cargo (Role)</label>
              <select class="form-select" name="group" required>
                {% for group in groups %}
                  <option value="{{ group.id }}" 
                    {% if group == current_group %}selected{% endif %}>
                    {{ group.name }}
                  </option>
                {% endfor %}
              </select>
            </div>
            
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" name="is_active" id="is_active" 
                     {% if usuario.is_active %}checked{% endif %}>
              <label class="form-check-label" for="is_active">Usuário Ativo</label>
            </div>
            
            <div class="d-flex gap-3 justify-content-end">
              <a href="{% url 'lista_usuarios' %}" class="btn btn-secondary">Cancelar</a>
              <button type="submit" class="btn btn-warning">Salvar Alterações</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
