<div class="modal fade" id="modalMetaMensal" tabindex="-1" aria-labelledby="modalMetaLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="modalMetaLabel">
          <i class="bi bi-target text-primary"></i> Alterar Meta Mensal
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      
      <form method="POST" action="{% url 'salvar_meta_mensal' %}">
        {% csrf_token %}
        <div class="modal-body p-4">
          <div class="mb-4">
            <label class="form-label fw-medium">Mês de Referência</label>
            <input type="month" class="form-control form-control-lg" name="mes" 
                   value="{{ meta_mensal.mes|date:'Y-m' }}" required>
            <small class="text-muted">Ex: 2026-04 para Abril/2026</small>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium">Valor da Meta (R$)</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text">R$</span>
              <input type="number" step="0.01" min="0" class="form-control" name="valor_meta" 
                     value="{{ meta_mensal.valor_meta|floatformat:2 }}" required>
            </div>
            <small class="text-muted">Qual o objetivo de saldo/lucro para este mês?</small>
          </div>
        </div>
        
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary px-5">
            <i class="bi bi-check-lg"></i> Salvar Meta
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
