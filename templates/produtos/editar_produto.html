{% extends 'base.html' %}

{% block title %}Editar Produto - FluxoMax{% endblock %}
{% block page_title %}Editar Produto{% endblock %}
{% block breadcrumb_current %}Produtos{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8 col-lg-9 col-md-10">
    <div class="card shadow-sm">
      <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-pencil-square"></i> Editar Produto
        </h5>
        <span class="badge bg-secondary">{{ produto.nome }}</span>
      </div>
      <div class="card-body p-4">
        <form method="POST" >
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Nome do Produto <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nome" value="{{ produto.nome }}" required>
          </div>
          <div class="col-md-6">
              <label class="form-label">Unidade</label>
              <select class="form-select" name="unidade">
                <option value="UN" {% if produto.unidade == 'UN' %}selected{% endif %}>Unidade (UN)</option>
                <option value="KG" {% if produto.unidade == 'KG' %}selected{% endif %}>Quilograma (KG)</option>
                <option value="LT" {% if produto.unidade == 'LT' %}selected{% endif %}>Litro (LT)</option>
                <option value="CX" {% if produto.unidade == 'CX' %}selected{% endif %}>Caixa (CX)</option>
                <option value="PCT" {% if produto.unidade == 'PCT' %}selected{% endif %}>Pacote (PCT)</option>
              </select>
            </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Preço de Compra (R$)</label>
              <input type="number" step="0.01" class="form-control" min="0" name="preco_de_compra" 
                     value="{{ produto.preco_de_compra|floatformat:2 }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Estoque Atual</label>
              <input type="number" class="form-control" name="estoque_atual" min="0" value="{{ produto.estoque_atual }}">
            </div>
          </div>

          <div class="row g-3 mt-2">
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <div class="form-check form-switch mt-3">
                <input class="form-check-input" type="checkbox" name="ativo" id="ativo" 
                       {% if produto.ativo %}checked{% endif %}>
                <label class="form-check-label" for="ativo">Produto Ativo</label>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-3 mt-5">
            <a href="{% url 'lista_produtos' %}" class="btn btn-secondary px-4">Cancelar</a>
            <button type="submit" class="btn btn-warning px-5">
              <i class="bi bi-save"></i> Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
