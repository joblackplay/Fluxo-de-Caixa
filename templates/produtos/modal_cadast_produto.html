<!-- MODAL CADASTRAR PRODUTO -->
<div class="modal fade" id="modalCadastrarProduto" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-box-seam"></i> Novo Produto
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      
      <form method="POST" action="{% url 'cadastrar_produto' %}">
        {% csrf_token %}
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-md-6">
            <label class="form-label">Nome do Produto <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nome" required>
          </div>
          <div class="col-md-6">
              <label class="form-label">Unidade</label>
              <select class="form-select" name="unidade">
                <option value="UN">Unidade</option>
                <option value="KG">Quilograma</option>
                <option value="LT">Litro</option>
                <option value="CX">Caixa</option>
                <option value="PCT">Pacote</option>
              </select>
            </div>
          </div>
            <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Preço de Compra (R$)</label>
              <input type="number" step="0.01" class="form-control" name="preco_de_compra" value="0.00">
            </div>
            <div class="col-md-6">
              <label class="form-label">Estoque Atual</label>
              <input type="number" class="form-control" name="estoque_atual" value="0" min="0">
            </div>
          </div>

          <div class="row g-3 mt-2">
            <div class="col-md-6">
              <label class="form-label">Estoque Mínimo</label>
              <input type="number" class="form-control" name="estoque_minimo" value="0" min="0">
            </div>
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <div class="form-check form-switch mt-3">
                <input class="form-check-input" type="checkbox" name="ativo" id="ativo" checked>
                <label class="form-check-label" for="ativo">Produto Ativo</label>
              </div>
            </div>
          </div>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Cadastrar Produto</button>
        </div>
      </form>
    </div>
  </div>
</div>
