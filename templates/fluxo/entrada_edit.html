{% extends 'base.html' %}

{% block title %}Entradas{% endblock %}

{% block page_title %}Editar Entradas{% endblock %}

{% block breadcrumb_current %}Editar Entradas{% endblock %}

{% block content%}




  <div class="row justify-content-center mt-5">
    <div class="col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-warning text-white">
          <h5 class="mb-0">Editar Entrada</h5>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
              <label class="form-label">Tipo de Entrada</label>
              <select class="form-select" name="tipo" required>
                {% for tipo in form.tipo.field.queryset %}
                  <option value="{{ tipo.id }}" {% if tipo.id == entrada.tipo.id %}selected{% endif %}>
                    {{ tipo.nome }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <input type="text" class="form-control" name="descricao" 
                     value="{{ entrada.descricao }}" required>
            </div>

            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label">Valor (R$)</label>
                <input type="number" step="0.01" min="0" class="form-control" 
                       name="valor" value="{{ entrada.valor }}" required>
              </div>
              <div class="col-6">
                <label class="form-label">Pagamento</label>
                <select class="form-select" name="pagamento">
                  <option value="Pix" {% if entrada.pagamento == 'Pix' %}selected{% endif %}>Pix</option>
                  <option value="Dinheiro" {% if entrada.pagamento == 'Dinheiro' %}selected{% endif %}>Dinheiro</option>
                  <option value="Cartão Crédito" {% if entrada.pagamento == 'Cartão Crédito' %}selected{% endif %}>Cartão Crédito</option>
                  <option value="Cartão Débito" {% if entrada.pagamento == 'Cartão Débito' %}selected{% endif %}>Cartão Débito</option>
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium">Observação</label>
                <textarea class="form-control" name="observacao" value="{{ entrada.observacao }}" rows="3" placeholder="Observações adicionais..."></textarea>
            </div>
            </div>

            <div class="d-flex gap-3 justify-content-end mt-4">
              <a href="{% url 'entradas_list' %}" class="btn btn-secondary">Cancelar</a>
              <button type="submit" class="btn btn-warning">Atualizar Entrada</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  {% endblock %}
