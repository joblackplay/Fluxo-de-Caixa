{% extends 'base.html' %}

{% block title %}Editar Saidas{% endblock %}

{% block page_title %}Editar Saidas{% endblock %}

{% block breadcrumb_current %}Editar Saidas{% endblock %}


{% block content%}



  <div class="row justify-content-center mt-5">
    <div class="col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-danger text-white">
          <h5 class="mb-0">Editar Saída</h5>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
              <label class="form-label">Tipo de Saída</label>
              <select class="form-select" name="tipo" required>
                {% for tipo in form.tipo.field.queryset %}
                  <option value="{{ tipo.id }}" 
                    {% if tipo.id == saida.tipo.id %}selected{% endif %}>
                    {{ tipo.nome }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <input type="text" class="form-control" name="descricao" 
                     value="{{ saida.descricao }}" required>
            </div>

            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label">Valor (R$)</label>
                <input type="number" step="0.01" min="0" class="form-control" 
                       name="valor" value="{{ saida.valor }}" required>
              </div>
              <div class="col-6">
                <label class="form-label">Pagamento</label>
                <select class="form-select" name="pagamento">
                  <option value="Pix" {% if saida.pagamento == 'Pix' %}selected{% endif %}>Pix</option>
                  <option value="Dinheiro" {% if saida.pagamento == 'Dinheiro' %}selected{% endif %}>Dinheiro</option>
                  <option value="Cartão Crédito" {% if saida.pagamento == 'Cartão Crédito' %}selected{% endif %}>Cartão Crédito</option>
                  <option value="Cartão Débito" {% if saida.pagamento == 'Cartão Débito' %}selected{% endif %}>Cartão Débito</option>
                </select>
              </div>
            </div>

            <div class="d-flex gap-3 justify-content-end mt-4">
              <a href="{% url 'saidas_list' %}" class="btn btn-secondary">Cancelar</a>
              <button type="submit" class="btn btn-danger">Atualizar Saída</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>


{%endblock%}
