{% load static %}


<dialog id="dialogEntrada" style="width: 480px;">
  <div class="p-4 border-bottom">
    <h5 class="fw-bold mb-0">Nova Entrada</h5>
  </div>

  <form method="POST" action="{% url 'entrada_create' %}" class="p-4">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label fw-medium">Tipo de Entrada</label>
      <select class="form-select" name="tipo" required>
        <option value="">Selecione um tipo...</option>
        {% for tipo in form.tipo.field.queryset %}
          <option value="{{ tipo.id }}">{{ tipo.nome }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label fw-medium">Descrição</label>
      <input type="text" class="form-control" name="descricao" placeholder="Ex: Venda à vista - Maria" required>
    </div>

    <div class="row mb-3">
      <div class="col-6">
        <label class="form-label fw-medium">Valor (R$)</label>
        <input type="number" step="0.01" min="0" class="form-control" name="valor" placeholder="0.00" required>
      </div>
      <div class="col-6">
        <label class="form-label fw-medium">Pagamento</label>
        <select class="form-select" name="pagamento">
          <option value="Pix" >Pix</option>
          <option value="Dinheiro" selected>Dinheiro</option>
          <option value="Cartão Crédito">Cartão Crédito</option>
          <option value="Cartão Débito">Cartão Débito</option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium">Observação</label>
      <textarea class="form-control" name="observacao" rows="3" placeholder="Observações adicionais..."></textarea>
    </div>

    <div class="d-flex gap-3 justify-content-end">
      <button type="button" class="btn btn-secondary px-4" onclick="fecharModalEntrada()">Cancelar</button>
      <button type="submit" class="btn btn-success px-5">Salvar Entrada</button>
    </div>
  </form>
</dialog>
